<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Joanne's Cookbook</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>

  <header class="header">
    <div id="auth-bar" class="auth-bar hidden"></div>
    <div class="header-content">
      <h1 class="header-title">Joanne's Cookbook</h1>
      <p class="header-subtitle">~5,000 family recipes</p>
    </div>
  </header>

  <main class="main">
    <section class="search-section">
      <div class="search-toggle">
        <button class="toggle-btn active" data-mode="name">Search by Name</button>
        <button class="toggle-btn" data-mode="craving">What do I feel like?</button>
      </div>

      <div class="search-container">
        <div id="name-search" class="search-input-wrap">
          <input
            type="text"
            id="name-input"
            class="search-input"
            placeholder="Search recipes by name..."
            autocomplete="off"
          >
        </div>
        <div id="craving-search" class="search-input-wrap hidden">
          <div id="api-key-area" class="api-key-area">
            <a href="#" id="api-key-toggle" class="api-key-toggle">🔑 Set Gemini API Key</a>
            <div id="api-key-form" class="api-key-form hidden">
              <input
                type="password"
                id="api-key-input"
                class="api-key-input"
                placeholder="Paste your Gemini API key..."
              >
              <button id="api-key-save" class="api-key-save">Save</button>
              <span id="api-key-status" class="api-key-status"></span>
              <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener" class="api-key-link">Get a key →</a>
            </div>
          </div>
          <textarea
            id="craving-input"
            class="search-textarea"
            placeholder="I'm craving something warm and cheesy..."
            rows="3"
          ></textarea>
          <button id="craving-btn" class="craving-search-btn">Find Recipes</button>
        </div>
      </div>
    </section>

    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <p>Searching recipes...</p>
    </div>

    <section class="results-section">
      <h2 id="results-heading" class="results-heading">Discover Recipes</h2>
      <div id="results-grid" class="results-grid"></div>
      <div id="empty-state" class="empty-state hidden">
        <p>No recipes found. Try a different search!</p>
      </div>
    </section>
  </main>

  <!-- Recipe Detail Modal -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <button id="modal-close" class="modal-close">&times;</button>
      <div id="modal-loading" class="modal-loading hidden">
        <div class="spinner"></div>
      </div>
      <div id="modal-content" class="modal-content">
        <h2 id="modal-title" class="modal-title"></h2>
        <div class="modal-meta">
          <span id="modal-category" class="badge"></span>
          <span id="modal-subcategory" class="modal-subcategory"></span>
          <span id="modal-serves" class="modal-serves"></span>
        </div>
        <div id="modal-ingredients-section" class="modal-section">
          <h3>Ingredients</h3>
          <ul id="modal-ingredients" class="ingredients-list"></ul>
        </div>
        <div id="modal-instructions-section" class="modal-section">
          <h3>Instructions</h3>
          <div id="modal-instructions" class="instructions-text"></div>
        </div>
        <div id="modal-notes-section" class="modal-section">
          <h3>Notes</h3>
          <p id="modal-notes" class="notes-text"></p>
        </div>

        <!-- Private Notes (signed-in users only) -->
        <div id="my-notes-section" class="my-notes-section hidden">
          <h3>📝 My Notes <span class="note-private-badge">Private</span></h3>
          <textarea id="my-notes-textarea" class="my-notes-textarea" placeholder="Add your personal notes..."></textarea>
          <div class="my-notes-actions">
            <span id="my-notes-status" class="my-notes-status"></span>
            <button id="my-notes-save" class="my-notes-save">Save Notes</button>
          </div>
        </div>

        <!-- Public Comments -->
        <div id="comments-section" class="comments-section">
          <h3>💬 Comments &amp; Changes</h3>
          <div id="comments-list" class="comments-list"></div>
          <div id="comment-form-wrap">
            <div id="comment-sign-in-prompt" class="sign-in-prompt hidden">Sign in to leave a comment</div>
            <form id="comment-form" class="comment-form hidden">
              <input type="text" id="comment-input" class="comment-input" placeholder="Share a change you made or tip..." autocomplete="off">
              <button type="submit" class="comment-submit">Post</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/fuse.min.js"></script>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script src="/app.js"></script>
</body>
</html>
